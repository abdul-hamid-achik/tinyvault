version: 2

project_name: tinyvault

before:
  hooks:
    - go mod tidy

builds:
  - id: tvault
    main: ./cmd/tvault
    binary: tvault
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: tvault
    ids:
      - tvault
    name_template: "tvault_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

  # Publish raw, versionless binaries alongside the archives so downstream
  # consumers (CI runners, install scripts) can grab a stable URL:
  #   https://github.com/abdul-hamid-achik/tinyvault/releases/latest/download/tvault-linux-amd64
  - id: tvault-binary
    ids:
      - tvault
    formats:
      - binary
    name_template: "tvault-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: tvault
    ids:
      - tvault
    binaries:
      - tvault
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/abdul-hamid-achik/tinyvault"
    description: "Dead simple secrets management CLI and MCP server"
    license: "MIT"
    # Released binaries are unsigned (pure-Go, CGO_ENABLED=0, not notarized),
    # so strip the Gatekeeper quarantine attribute on install — otherwise macOS
    # refuses to run a cask-installed unsigned binary ("damaged and can't be opened").
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tvault"]
          end
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"

nfpms:
  - id: packages
    ids:
      - tvault
    package_name: tvault
    vendor: TinyVault
    homepage: https://github.com/abdul-hamid-achik/tinyvault
    maintainer: Abdul Hamid Achik <abdul.achik@gmail.com>
    description: "Dead simple secrets management CLI and MCP server"
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

release:
  github:
    owner: abdul-hamid-achik
    name: tinyvault
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
