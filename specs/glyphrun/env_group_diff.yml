version: 1
name: tvault_env_group_create_diff

intent: |
  A user creates two projects, sets secrets in each with intentional drift,
  creates an environment group linking both projects, runs `tvault env diff`
  to detect the drift, promotes the missing key from production to preview,
  then re-runs diff to confirm no drift. This is the end-to-end smoke test
  for the environment profiles feature.

target:
  cmd: ["./bin/tvault", "env", "diff", "liftclub"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/vault"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/vault"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_SECRET_KEY sk_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_WEBHOOK_SECRET wh_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://preview -p liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_SECRET_KEY sk_preview -p liftclub-preview"
      timeoutMs: 10000
    # Create the group linking both projects
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault env group create liftclub --env production=liftclub --env preview=liftclub-preview"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "drift"
      timeoutMs: 10000
  - snapshot: drift_detected

outcomes:
  - id: drift_detected
    description: env diff reports drift because STRIPE_WEBHOOK_SECRET is missing in preview
    verify:
      screen:
        contains: "drift"