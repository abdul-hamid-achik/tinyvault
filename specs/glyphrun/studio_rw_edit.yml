version: 1
name: tvault_studio_rw_edit

intent: |
  A user opens `tvault studio --rw` (in-app writes enabled; the header shows an
  "rw" badge) on an unlocked vault. They create a new secret with `n` (typing a
  key in the "New secret — key name" modal, then a value in the "New secret —
  value" modal), watch the Secrets pane count grow 2 → 3 with the new key in the
  list, then delete it with `d` (confirming "Delete 'API_TOKEN' permanently?")
  + `y`, watching the count return to 3 → 2. Every write goes through the same
  vault.SetSecret / DeleteSecret path as the CLI.

  This proves the audited in-app edit path (new + delete) drives correctly over
  a real PTY, asserting directly on the modal titles, the confirmation text, and
  the pane-count digit (2 → 3 → 2). The model-only mutation logic is also covered
  by cmd/tvault/cmd/studio/mutations_test.go.

target:
  cmd: ["./bin/tvault", "studio", "--rw", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/rw"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 20000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/rw"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/rw TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/rw TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/rw TVAULT_PASSPHRASE=glyphpass ./bin/tvault use webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/rw TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_KEY sk_live_glyph123 -p webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/rw TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DB_URL postgres://glyph -p webapp"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "unlocked"
      timeoutMs: 6000
  # Start with 2 secrets — the pane count renders the real digit.
  - wait:
      screen:
        contains: "Secrets (2)"
      timeoutMs: 3000
  - snapshot: rw_start
  # n → the new-key modal (title + the field's placeholder hint both render).
  - press: "n"
  - wait:
      screen:
        contains: "New secret — key name"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "new key name"
      timeoutMs: 3000
  - type: "API_TOKEN"
  # enter → the value modal; its placeholder names the key being set.
  - press: "enter"
  - wait:
      screen:
        contains: "New secret — value"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "value for API_TOKEN"
      timeoutMs: 3000
  - type: "tok_secret_999"
  # enter saves; the modal closes, the panes reload, the count grows to 3, and
  # the new key joins the (sorted-first) Secrets list.
  - press: "enter"
  - wait:
      screen:
        contains: "Secrets (3)"
      timeoutMs: 5000
  - wait:
      screen:
        contains: "API_TOKEN"
      timeoutMs: 3000
  - snapshot: created
  # d → the delete-confirm modal for the selected key (API_TOKEN, sorted first).
  - press: "d"
  - wait:
      screen:
        contains: "Delete 'API_TOKEN' permanently?"
      timeoutMs: 3000
  - press: "y"
  # The delete completes; the count returns to 2.
  - wait:
      screen:
        contains: "Secrets (2)"
      timeoutMs: 5000
  - snapshot: deleted
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  - id: clean_exit
    description: q exits cleanly with status 0 after an in-app create + delete
    verify:
      process:
        exitCode: 0
