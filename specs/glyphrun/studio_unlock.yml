version: 1
name: tvault_studio_unlock

intent: |
  A user opens `tvault studio` against a locked vault (the header shows
  "● locked"). Project and secret metadata are still browsable while locked.
  The user presses `u`, the "Unlock vault" modal appears, types the passphrase,
  and presses enter. The vault unlocks ("● unlocked"), and a subsequent `r`
  reveals a real value (postgres://glyph). Then `q` quits cleanly.

  This proves the in-app unlock flow — the only way to go from locked to
  unlocked inside the studio — drives correctly over a PTY, asserting on the
  unlock modal itself and the header lock badge.

  Note on the locked start: glyphrun.config.yml injects TVAULT_PASSPHRASE into
  every target's environment (so the other specs launch unlocked). This spec
  overrides it with a deliberately wrong value, so the non-interactive unlock
  fails and the studio launches locked — exactly the state we want to exercise
  the in-app `u` flow against.

target:
  cmd: ["./bin/tvault", "studio", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/unlock"
    # Wrong on purpose: studio ignores a failed non-interactive unlock and
    # launches locked, which is the state this spec needs.
    TVAULT_PASSPHRASE: "wrong-on-purpose"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/unlock"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault use webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DB_URL postgres://glyph -p webapp"
      timeoutMs: 10000

steps:
  # The wrong env passphrase leaves the browser locked.
  - wait:
      screen:
        contains: "● locked"
      timeoutMs: 6000
  # Metadata (the key) is visible even while locked.
  - wait:
      screen:
        contains: "DB_URL"
      timeoutMs: 3000
  - snapshot: locked
  # u opens the in-app unlock modal — assert its title + prompt render.
  - press: "u"
  - wait:
      screen:
        contains: "Unlock vault"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "enter passphrase"
      timeoutMs: 3000
  - snapshot: unlock_modal
  - type: "glyphpass"
  - press: "enter"
  # The "● unlocked" badge only renders after the status reload confirms the
  # vault is actually unlocked (distinct from the "vault unlocked" status line).
  - wait:
      screen:
        contains: "● unlocked"
      timeoutMs: 4000
  - snapshot: unlocked
  # Now a reveal works against the unlocked vault.
  - press: "r"
  - wait:
      screen:
        contains: "postgres://glyph"
      timeoutMs: 3000
  - snapshot: unlocked_revealed
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  - id: clean_exit
    description: q exits cleanly with status 0 after an in-app unlock + reveal
    verify:
      process:
        exitCode: 0
