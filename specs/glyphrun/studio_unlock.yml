version: 1
name: tvault_studio_unlock

intent: |
  A user opens `tvault browse` against a locked vault (the header shows
  "● locked"). Project and secret metadata are still browsable while locked.
  The user presses `u`, types the passphrase into the in-app unlock modal, and
  presses enter. The vault unlocks ("● unlocked"), and a subsequent `r` reveals
  a real value (postgres://glyph). Then `q` quits cleanly.

  This proves the in-app unlock flow — the only way to go from locked to
  unlocked inside the browser — drives correctly over a PTY.

  Note on the locked start: glyphrun.config.yml injects TVAULT_PASSPHRASE into
  every target's environment (so the other specs launch unlocked). This spec
  overrides it with a deliberately wrong value, so browse's non-interactive
  unlock fails and the browser launches locked — exactly the state we want to
  exercise the in-app `u` flow against.

  Note on overlays: glyphrun's terminal emulator does not fully apply Bubble
  Tea v2's cell-diff repaint when a centered modal opens over the multi-pane
  body (stale border cells linger), so this spec drives the unlock modal
  "blind" — the model processes keystrokes regardless of render — and asserts
  only on the clean header state before ("● locked") and after ("● unlocked").
  The modal's own contents are covered by the model tests in
  cmd/tvault/cmd/browse/model_test.go.

target:
  cmd: ["./bin/tvault", "studio", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/unlock"
    # Wrong on purpose: browse ignores a failed non-interactive unlock and
    # launches locked, which is the state this spec needs.
    TVAULT_PASSPHRASE: "wrong-on-purpose"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/unlock"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault use webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/unlock TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DB_URL postgres://glyph -p webapp"
      timeoutMs: 10000

steps:
  # The wrong env passphrase leaves the browser locked.
  - wait:
      screen:
        contains: "● locked"
      timeoutMs: 6000
  # Metadata (the key) is visible even while locked.
  - wait:
      screen:
        contains: "DB_URL"
      timeoutMs: 3000
  - snapshot: locked
  # u opens the in-app unlock modal (driven blind — see the header note above).
  - press: "u"
  - wait:
      idle:
        quietForMs: 350
      timeoutMs: 3000
  - type: "glyphpass"
  - wait:
      idle:
        quietForMs: 350
      timeoutMs: 3000
  - press: "enter"
  # The "● unlocked" badge only renders after the status reload confirms the
  # vault is actually unlocked (distinct from the "vault unlocked" status line).
  - wait:
      screen:
        contains: "● unlocked"
      timeoutMs: 4000
  - snapshot: unlocked
  # Now a reveal works against the unlocked vault.
  - press: "r"
  - wait:
      screen:
        contains: "postgres://glyph"
      timeoutMs: 3000
  - snapshot: unlocked_revealed
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  - id: clean_exit
    description: q exits cleanly with status 0 after an in-app unlock + reveal
    verify:
      process:
        exitCode: 0
