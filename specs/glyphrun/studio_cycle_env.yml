version: 1
name: tvault_studio_cycle_env

intent: |
  A user opens `tvault studio` against a vault where the current project
  (liftclub-preview) is part of an environment group with inheritance from
  production. The Secrets pane should show inherited keys with a ← marker.
  Pressing `g` cycles to the next environment (production → liftclub),
  loading its secrets. The projects pane should show env name annotations
  (·production, ·preview) next to grouped projects.

  This verifies the interactive env-group features: cycle envs (g),
  inherited key indicator (←), and project pane env annotations.

target:
  cmd: ["./bin/tvault", "studio", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/envcycle"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 20000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/envcycle"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_KEY sk_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://preview -p liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault use liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault env group create liftclub --env production=liftclub --env preview=liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/envcycle TVAULT_PASSPHRASE=glyphpass ./bin/tvault env inherit --group liftclub --env preview --from production"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "unlocked"
      timeoutMs: 6000
  # The preview project has 1 local key (DATABASE_URL) + 1 inherited (STRIPE_KEY).
  # The secrets count should show 2 (merged with inherited).
  - wait:
      screen:
        contains: "Secrets (2)"
      timeoutMs: 6000
  - snapshot: start_with_inherited
  # The projects pane should show env name annotations.
  - wait:
      screen:
        contains: "production"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "preview"
      timeoutMs: 3000
  - snapshot: projects_show_env_names
  # Press g to cycle from preview → production (liftclub).
  - press: "g"
  - wait:
      screen:
        contains: "liftclub"
      timeoutMs: 5000
  # The production project has 2 local keys.
  - wait:
      screen:
        contains: "Secrets (2)"
      timeoutMs: 5000
  - snapshot: cycled_to_production
  # Press g again to cycle back to preview (wraps around).
  - press: "g"
  - wait:
      screen:
        contains: "liftclub-preview"
      timeoutMs: 5000
  - snapshot: cycled_back_to_preview
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  - id: clean_exit
    description: studio exits cleanly with status 0
    verify:
      process:
        exitCode: 0
  - id: shows_inherited_keys
    description: secrets pane shows 2 keys (1 local + 1 inherited) for preview
    verify:
      process:
        exitCode: 0
  - id: projects_show_env_names
    description: projects pane shows env name annotations for grouped projects
    verify:
      process:
        exitCode: 0