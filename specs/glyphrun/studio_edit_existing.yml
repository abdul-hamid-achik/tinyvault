version: 1
name: studio_edit_existing

intent: |
  A user opens `tvault studio --rw` (in-app writes enabled; the header shows an
  "rw" badge) on an unlocked vault that holds a `webapp` project with
  DB_URL=postgres://old. They focus the Secrets pane (DB_URL is sorted first, so
  the cursor already sits on it), press `e` to edit, clear the prefilled current
  value, type a new value, and save — proving the audited in-app *edit* path
  (modeSetValue with editing=true) drives an existing key through the same
  vault.SetSecret call the CLI uses.

  The edit overlay prefills the field with the current decrypted value and puts
  the cursor at the end (startEditSecret → CursorEnd). To replace it we press
  ctrl+u (the textinput DeleteBeforeCursor binding), which deletes everything
  before the cursor — the whole line — then type the new value and ⏎ to save.

  It asserts on the modal title ("Edit DB_URL"), the footer status line
  confirming the write ("set DB_URL"), and the new value when revealed
  ("postgres://new"). The model-only mutation logic is also covered by
  cmd/tvault/cmd/studio/mutations_test.go.

target:
  cmd: ["./bin/tvault", "studio", "--rw", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/edit"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 20000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/edit"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/edit TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/edit TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/edit TVAULT_PASSPHRASE=glyphpass ./bin/tvault use webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/edit TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DB_URL postgres://old -p webapp"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "unlocked"
      timeoutMs: 6000
  # Clean multi-pane state: one secret (DB_URL), sorted first → cursor on it.
  - wait:
      screen:
        contains: "Secrets (1)"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "DB_URL"
      timeoutMs: 3000
  - snapshot: before_edit
  # e → the edit modal, titled "Edit DB_URL" and prefilled with the current
  # value (cursor at end). The Secrets pane is focused by default, cursor on DB_URL.
  - press: "e"
  - wait:
      screen:
        contains: "Edit DB_URL"
      timeoutMs: 3000
  # The field is prefilled with the current decrypted value, shown in full.
  - wait:
      screen:
        contains: "postgres://old"
      timeoutMs: 3000
  - snapshot: edit_modal
  # ctrl+u clears the prefilled value (DeleteBeforeCursor; cursor is at the end),
  # then type the replacement (a brief settle lets the clear apply).
  - press: "ctrl+u"
  - wait:
      idle:
        quietForMs: 300
      timeoutMs: 3000
  - type: "postgres://new"
  # ⏎ saves; the modal closes and the panes reload. Settle on idle so every
  # reload (status/projects/secrets/audit) has landed before asserting.
  - press: "enter"
  - wait:
      idle:
        quietForMs: 500
      timeoutMs: 5000
  # The write is confirmed in the footer status line as a whole token.
  - wait:
      screen:
        contains: "set DB_URL"
      timeoutMs: 5000
  - snapshot: saved
  # Reveal the edited value: cursor is still on DB_URL (sorted first).
  - press: "r"
  - wait:
      screen:
        contains: "postgres://new"
      timeoutMs: 3000
  - snapshot: revealed
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  # The screen assertions ("unlocked", "DB_URL", "set DB_URL", the revealed new
  # value) are enforced by the wait steps above — a wait that times out errors
  # the run. The outcome verifies the durable end-state: studio exits the
  # alternate screen with status 0 after an in-app edit of an existing secret.
  - id: clean_exit
    description: q exits cleanly with status 0 after editing an existing secret's value
    verify:
      process:
        exitCode: 0
