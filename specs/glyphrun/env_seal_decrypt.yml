version: 1
name: tvault_env_seal_decrypt_section

intent: |
  A user seals all environments of a group into a single v2 blob, then
  decrypts it with --section to extract one environment's values.
  This verifies the sealed-profile bundle round-trip end-to-end.

target:
  cmd: ["./bin/tvault", "decrypt-env", "--in", ".glyphrun/tmp/sealed.env", "--identity", "ci", "--section", "preview"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/vault"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/vault"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_KEY sk_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://preview -p liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault env group create liftclub --env production=liftclub --env preview=liftclub-preview"
      timeoutMs: 10000
    # Create a CI identity
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault identity new ci"
      timeoutMs: 10000
    # Get the recipient string
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault identity list"
      timeoutMs: 10000
    # Seal the group (recipient string is deterministic from the identity)
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault env seal --group liftclub --recipient $(TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault identity list | grep ci | awk '{print $2}') -o .glyphrun/tmp/sealed.env"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "DATABASE_URL"
      timeoutMs: 10000
  - wait:
      screen:
        contains: "postgres://preview"
      timeoutMs: 5000
  - snapshot: decrypted_section

outcomes:
  - id: preview_section_decrypted
    description: decrypt-env --section preview extracts only the preview environment
    verify:
      screen:
        contains: "postgres://preview"
  - id: no_production_values
    description: production values should NOT appear in the preview-only section
    verify:
      screen:
        not_contains: "sk_prod"