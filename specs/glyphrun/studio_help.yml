version: 1
name: studio_help

intent: |
  A user opens `tvault studio` against an unlocked vault, focuses the Secrets
  pane, and presses `?` to open the in-app help overlay (a centered glamour
  cheat sheet). They read it, then press `esc` to close it and return to the
  clean multi-pane view, and quit cleanly with `q`.

  This is the end-to-end PTY smoke test for the help overlay (modeHelp). It
  asserts on the overlay's title ("Help") and the glamour-rendered cheat-sheet
  heading ("tvault studio — keys & concepts") when open, then on the Secrets
  footer hint ("reveal all") once `esc` restores the clean multi-pane view.
  The full overlay contents are also covered by cmd/tvault/cmd/studio/*_test.go.

target:
  cmd: ["./bin/tvault", "studio", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/help"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/help"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/help TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/help TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/help TVAULT_PASSPHRASE=glyphpass ./bin/tvault use webapp"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/help TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DB_URL postgres://glyph -p webapp"
      timeoutMs: 10000

steps:
  # Clean unlocked multi-pane start.
  - wait:
      screen:
        contains: "unlocked"
      timeoutMs: 6000
  - wait:
      screen:
        contains: "webapp"
      timeoutMs: 3000
  # Focus the Secrets pane so the footer activeHint is the read-only secrets
  # hint ("…R reveal all…") — the whole-token string we assert on after esc.
  - press: "3"
  - wait:
      screen:
        contains: "DB_URL"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "reveal all"
      timeoutMs: 3000
  - snapshot: before_help
  # ? opens the help overlay (modeHelp): assert its title + cheat-sheet heading.
  - press: "?"
  - wait:
      screen:
        contains: "Help"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "keys & concepts"
      timeoutMs: 3000
  - snapshot: help_open
  # esc closes the overlay and restores modeNormal. Settle on idle so the
  # multi-pane body has fully repainted before asserting on the footer.
  - press: "esc"
  - wait:
      idle:
        quietForMs: 400
      timeoutMs: 3000
  # Back on the clean Secrets view: the read-only secrets footer hint repaints
  # as a whole token. This proves the overlay closed and panes returned.
  - wait:
      screen:
        contains: "reveal all"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "DB_URL"
      timeoutMs: 3000
  - snapshot: help_closed
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  # The wait steps enforce the flow: an unlocked start, the secrets hint before
  # help, the idle settles around `?`/`esc`, and the secrets hint + DB_URL row
  # returning after esc (proving the overlay closed). A wait that times out
  # errors the run. This outcome verifies the durable end-state: the studio
  # exits the alternate screen and returns status 0 (vault closed).
  - id: clean_exit
    description: "? opens help and esc closes it, then q exits cleanly with status 0"
    verify:
      process:
        exitCode: 0
