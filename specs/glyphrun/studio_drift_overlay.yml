version: 1
name: tvault_studio_drift_overlay

intent: |
  A user opens `tvault studio` against a vault where the current project
  (liftclub-preview) is part of an environment group. They press `D` to
  open the env drift overlay, which shows a key-set diff table across all
  environments. The overlay shows the group name, a drift status, and a
  table of keys vs environments with ✓/✗ markers. Pressing esc closes
  the overlay and returns to the normal pane view.

  This verifies the drift overlay (D key) renders correctly over a real
  PTY and closes cleanly with esc.

target:
  cmd: ["./bin/tvault", "studio", "--no-anim"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/drift"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 20000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color
  alternateScreen: require

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/drift"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_KEY sk_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://preview -p liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault use liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/drift TVAULT_PASSPHRASE=glyphpass ./bin/tvault env group create liftclub --env production=liftclub --env preview=liftclub-preview"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "unlocked"
      timeoutMs: 6000
  - snapshot: start
  # Press D to open the drift overlay.
  - press: "D"
  # The overlay should show the title and group name.
  - wait:
      screen:
        contains: "Env drift"
      timeoutMs: 5000
  - wait:
      screen:
        contains: "liftclub"
      timeoutMs: 3000
  - snapshot: drift_overlay_shown
  # The drift table should show key names.
  - wait:
      screen:
        contains: "DATABASE_URL"
      timeoutMs: 3000
  - wait:
      screen:
        contains: "STRIPE_KEY"
      timeoutMs: 3000
  - snapshot: drift_table_with_keys
  # Press esc to close the overlay.
  - press: "esc"
  - wait:
      screen:
        contains: "Secrets"
      timeoutMs: 3000
  - snapshot: drift_closed
  - press: "q"
  - wait:
      process:
        exitCode: 0
      timeoutMs: 5000

outcomes:
  - id: clean_exit
    description: studio exits cleanly with status 0
    verify:
      process:
        exitCode: 0
  - id: drift_overlay_shows
    description: drift overlay shows the Env drift title and group name
    verify:
      process:
        exitCode: 0