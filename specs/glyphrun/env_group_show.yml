version: 1
name: tvault_env_group_list_show

intent: |
  A user creates an environment group, lists it, and shows its details
  (including drift status). This verifies the group management CLI
  surface end-to-end.

target:
  cmd: ["./bin/tvault", "env", "group", "show", "liftclub"]
  cwd: "."
  env:
    TVAULT_DIR: ".glyphrun/tmp/vault"
    TVAULT_PASSPHRASE: "glyphpass"
  timeoutMs: 15000

terminal:
  cols: 120
  rows: 40
  profile: xterm-256color

preconditions:
  commands:
    - run: "go build -o ./bin/tvault ./cmd/tvault"
      timeoutMs: 120000
    - run: "rm -rf .glyphrun/tmp/vault"
      timeoutMs: 5000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault init"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault projects create liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set STRIPE_KEY sk_prod -p liftclub"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault set DATABASE_URL postgres://preview -p liftclub-preview"
      timeoutMs: 10000
    - run: "TVAULT_DIR=.glyphrun/tmp/vault TVAULT_PASSPHRASE=glyphpass ./bin/tvault env group create liftclub --env production=liftclub --env preview=liftclub-preview"
      timeoutMs: 10000

steps:
  - wait:
      screen:
        contains: "production"
      timeoutMs: 10000
  - wait:
      screen:
        contains: "preview"
      timeoutMs: 5000
  - snapshot: group_show

outcomes:
  - id: shows_environments
    description: env group show displays both environments
    verify:
      screen:
        contains: "production"
  - id: shows_drift
    description: env group show detects drift (STRIPE_KEY missing in preview)
    verify:
      screen:
        contains: "drift"